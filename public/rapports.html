<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowtym PMS — Rapports</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --violet:#8B5CF6; --violet-light:#EDE9FE; --violet-d:#7C3AED;
  --green:#16A34A; --green-l:#DCFCE7;
  --red:#DC2626; --red-l:#FEE2E2;
  --amber:#D97706; --amber-l:#FEF3C7;
  --blue:#2563EB; --blue-l:#DBEAFE;
  --gray50:#F9FAFB; --gray100:#F3F4F6; --gray200:#E5E7EB;
  --gray400:#9CA3AF; --gray600:#4B5563; --gray700:#374151; --gray900:#111827;
  --border:#E5E7EB; --bg:#F8F9FC;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--gray900);font-size:13px;line-height:1.5}

/* ── Layout ─────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:1600px;margin:0 auto;padding:10px;gap:8px}

/* ── Panel / Card ────────────────────────────────────────── */
.panel{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
.phd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--gray50)}
.phd .ptit{font-size:11px;font-weight:700;color:var(--gray900)}
.phd .pmeta{font-size:10px;color:var(--gray400)}
.pbody{padding:10px 12px}

/* ── Barre supérieure ────────────────────────────────────── */
.phdr{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.phdr-l{display:flex;align-items:center;gap:8px}
.picon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--violet-light);color:var(--violet)}
.picon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ptitle{font-size:14px;font-weight:800;color:var(--gray900)}
.psub{font-size:10px;color:var(--gray400);font-weight:500}
.pactions{display:flex;gap:5px;flex-wrap:wrap}

/* ── Buttons ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;line-height:1}
.btn svg{flex-shrink:0}
.btn-v{background:var(--violet);color:#fff} .btn-v:hover{background:var(--violet-d)}
.btn-g{background:#fff;color:var(--gray700);border:1px solid var(--border)} .btn-g:hover{background:var(--gray50);border-color:var(--gray400)}
.btn-r{background:var(--red);color:#fff;font-size:11px;padding:4px 8px;border-radius:6px}
.btn-sm{font-size:11px;padding:5px 9px}

/* ── Period selector ─────────────────────────────────────── */
.rpd{display:flex;align-items:center;padding:5px 11px;font-size:11px;font-weight:600;color:var(--gray600);border-radius:5px;cursor:pointer;border:none;background:transparent;transition:all .15s}
.rpd:hover{color:var(--violet)}
.rpd.active{background:#fff;color:var(--violet);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:700}

/* ── Family nav ──────────────────────────────────────────── */
.rpt-family-wrap{position:relative;flex-shrink:0}
.rpt-family-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--gray700);transition:all .18s;white-space:nowrap}
.rpt-family-btn:hover{background:var(--violet-light);color:var(--violet);border-color:var(--violet)}
.rpt-family-btn.active{background:var(--violet);color:#fff;border-color:var(--violet);box-shadow:0 2px 8px rgba(139,92,246,.3)}
.rpt-family-btn.active svg{stroke:#fff}
.rpt-dropdown{position:absolute;top:calc(100% + 6px);left:0;min-width:210px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.13);z-index:200;overflow:hidden;animation:dropIn .12s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.rpt-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px 12px;font-size:12px;font-weight:500;color:var(--gray700);border:none;background:transparent;cursor:pointer;border-bottom:1px solid var(--gray100);text-align:left;transition:all .1s}
.rpt-item:last-child{border-bottom:none}
.rpt-item:hover{background:var(--violet-light);color:var(--violet)}
.rpt-item.active{background:var(--violet-light);color:var(--violet);font-weight:700}
.rpt-code{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;background:#ede9fe;color:#5b21b6;font-family:monospace;flex-shrink:0}
.rpt-item.active .rpt-code{background:#ddd6fe;color:#4c1d95}

/* ── Rapport area ────────────────────────────────────────── */
#rapportArea{display:flex;flex-direction:column;gap:12px}

/* ── Rapport header (premium) ────────────────────────────── */
.rpt-header-card{background:linear-gradient(135deg,#6d28d9 0%,#8b5cf6 60%,#a78bfa 100%);border-radius:12px;padding:16px 20px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.rpt-header-card::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:rgba(255,255,255,.06);border-radius:50%}
.rpt-header-card::before{content:'';position:absolute;right:40px;top:30px;width:60px;height:60px;background:rgba(255,255,255,.04);border-radius:50%}
.rpt-header-title{font-size:16px;font-weight:800;position:relative;z-index:1}
.rpt-header-sub{font-size:11px;opacity:.75;margin-top:3px;position:relative;z-index:1}
.rpt-header-right{text-align:right;position:relative;z-index:1}
.rpt-header-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,255,255,.2);backdrop-filter:blur(4px);margin-bottom:6px}
.rpt-header-date{font-size:10px;opacity:.7}
.orient-toggle{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;color:#fff;cursor:pointer;transition:all .15s;position:relative;z-index:1}
.orient-toggle:hover{background:rgba(255,255,255,.25)}

/* ── KPI grid ────────────────────────────────────────────── */
.kgrid{display:grid;gap:7px}
.kcard{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kbar{position:absolute;left:0;top:0;bottom:0;width:3px}
.klbl{font-size:9px;color:var(--gray400);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;margin-left:8px}
.kval{font-size:18px;font-weight:800;color:var(--gray900);margin-left:8px}
.kdelta{margin-top:3px;margin-left:8px}

/* ── Table ───────────────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead tr{background:var(--gray50)}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--gray600);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl th.r,.tbl td.r{text-align:right}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--gray100);color:var(--gray700);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:var(--gray50)}

/* ── Pills ───────────────────────────────────────────────── */
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap}
.pg{background:#dcfce7;color:#15803d}
.pv{background:#ede9fe;color:#6d28d9}
.pb{background:#dbeafe;color:#1d4ed8}
.pa{background:#fef3c7;color:#92400e}
.pr{background:#fee2e2;color:#b91c1c}
.pp{background:#f3f4f6;color:#374151}

/* ── Inputs ──────────────────────────────────────────────── */
.finput{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;outline:none;transition:border .15s;background:#fff}
.finput:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(139,92,246,.1)}
.fsel2{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;outline:none;background:#fff}

/* ── Search bar ──────────────────────────────────────────── */
.sbar{position:relative;display:flex;align-items:center}
.sbar svg{position:absolute;left:9px;width:13px;height:13px;stroke:var(--gray400);fill:none}
.sbar input{padding:6px 10px 6px 30px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;outline:none;background:var(--gray50);transition:all .15s}
.sbar input:focus{background:#fff;border-color:var(--violet);box-shadow:0 0 0 3px rgba(139,92,246,.1)}

/* ── Pagination ──────────────────────────────────────────── */
.pagination{display:flex;align-items:center;justify-content:between;gap:6px;padding:12px 16px;border-top:1px solid var(--border);background:var(--gray50);flex-wrap:wrap}
.pag-info{font-size:11px;color:var(--gray400);margin-right:auto}
.pag-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--gray700);transition:all .12s}
.pag-btn:hover:not(:disabled){border-color:var(--violet);color:var(--violet)}
.pag-btn:disabled{opacity:.4;cursor:default}
.pag-btn.active{background:var(--violet);color:#fff;border-color:var(--violet)}
.per-page{font-size:11px;color:var(--gray600);display:flex;align-items:center;gap:5px}
.per-page select{padding:3px 6px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;background:#fff;outline:none}

/* ── Toast ───────────────────────────────────────────────── */
#toastContainer{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:10px 16px;border-radius:10px;font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:toastIn .2s ease;pointer-events:none;max-width:300px}
.toast.ok{background:#fff;border:1px solid var(--green);color:var(--green)}
.toast.err{background:#fff;border:1px solid var(--red);color:var(--red)}
.toast.info{background:var(--violet);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── Modal overlay ───────────────────────────────────────── */
.sm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sm-box{background:#fff;border-radius:16px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .2s ease;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.sm-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.sm-ttl{font-size:14px;font-weight:700}
.sm-close{width:28px;height:28px;border:none;background:var(--gray100);border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--gray400)}
.sm-close:hover{background:var(--gray200)}
.sm-body{padding:20px}
.sm-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--gray50)}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:11px;font-weight:600;color:var(--gray600)}

/* ── Orientation toggle area ─────────────────────────────── */
.orient-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--gray50);border-bottom:1px solid var(--border);font-size:11px;color:var(--gray600)}
.orient-bar button{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:10px;font-weight:600;cursor:pointer;color:var(--gray700);transition:all .12s}
.orient-bar button.active{background:var(--violet);color:#fff;border-color:var(--violet)}

/* ── Compare banner ──────────────────────────────────────── */
.cmp-banner{padding:10px 16px;background:var(--violet-light);border-radius:10px;font-size:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2px}
.cmp-banner > div b{color:var(--green)}

/* ── Print ───────────────────────────────────────────────── */
@media print {
  body{background:#fff}
  .phdr,.panel:has(#rpt-nav),.pactions,#rpt-nav,.period-bar,.orient-bar,.pag-btn,button,.btn,#toastContainer{display:none!important}
  .panel{box-shadow:none;border:1px solid #ddd}
  .rpt-header-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* ── Responsive ──────────────────────────────────────────── */
@media(max-width:768px){
  .kgrid{grid-template-columns:1fr 1fr!important}
  #rpt-nav{flex-wrap:wrap}
  .rpt-family-btn{font-size:11px;padding:6px 10px}
  .phdr{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="app">

  <!-- ── EN-TÊTE ────────────────────────────────────────────── -->
  <div class="phdr" style="margin-bottom:2px">
    <div class="phdr-l">
      <div class="picon">
        <svg viewBox="0 0 24 24"><path d="M2 12l4-4 3 3 5-6M3 20h18"/></svg>
      </div>
      <div>
        <div class="ptitle">Rapports PMS</div>
        <div class="psub" id="rpt-period-label">Aujourd'hui</div>
      </div>
    </div>
    <div class="pactions">
      <button class="btn btn-g btn-sm" id="cmpBtn" onclick="toggleCompare(this)">↔ Comparer N-1</button>
      <button class="btn btn-g btn-sm" onclick="exportPDF()">
        <svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none"><path d="M12 16l-4-4h3V4h2v8h3l-4 4zM4 20h16"/></svg> PDF
      </button>
      <button class="btn btn-g btn-sm" onclick="exportExcel()">
        <svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 8l8 8M16 8l-8 8"/></svg> Excel
      </button>
    </div>
  </div>

  <!-- ── SÉLECTEUR PÉRIODE ─────────────────────────────────── -->
  <div class="panel period-bar">
    <div style="padding:7px 12px">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;color:var(--gray600);white-space:nowrap">Période :</span>
        <div style="display:flex;gap:2px;background:var(--gray100);border-radius:6px;padding:2px">
          <button class="rpd active" data-p="today"     onclick="selectPeriod('today',this)">Aujourd'hui</button>
          <button class="rpd"        data-p="yesterday" onclick="selectPeriod('yesterday',this)">Hier</button>
          <button class="rpd"        data-p="week"      onclick="selectPeriod('week',this)">Semaine</button>
          <button class="rpd"        data-p="month"     onclick="selectPeriod('month',this)">Mois</button>
          <button class="rpd"        data-p="year"      onclick="selectPeriod('year',this)">Année</button>
          <button class="rpd"        data-p="custom"    onclick="selectPeriod('custom',this)">Perso</button>
        </div>
        <div id="customDates" style="display:none;gap:6px;align-items:center">
          <input type="date" id="rDateFrom" class="finput" style="padding:5px 8px;font-size:11px;width:130px">
          <span style="color:var(--gray400);font-size:11px">→</span>
          <input type="date" id="rDateTo"   class="finput" style="padding:5px 8px;font-size:11px;width:130px">
        </div>
        <button class="btn btn-v btn-sm" onclick="applyPeriod()" style="white-space:nowrap">
          <svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:#fff;fill:none"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5l3.5 3.5"/></svg>
          Rechercher
        </button>
        <span id="cmpLabel" style="display:none;font-size:10px;color:var(--violet);background:var(--violet-light);padding:3px 8px;border-radius:10px;font-weight:600">↔ vs N-1 actif</span>
      </div>
    </div>
  </div>

  <!-- ── NAV FAMILLES ──────────────────────────────────────── -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;position:relative" id="rpt-nav">

    <div class="rpt-family-wrap">
      <button class="rpt-family-btn active" onclick="toggleFamily('exp',this)">
        <svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none"><rect x="2" y="2" width="12" height="3" rx="1"/><rect x="2" y="7" width="8" height="3" rx="1"/><rect x="2" y="12" width="5" height="2" rx="1"/></svg>
        Exploitation
        <svg viewBox="0 0 10 6" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:1.5;margin-left:2px;transition:transform .15s" id="arr-exp"><path d="M1 1l4 4 4-4"/></svg>
      </button>
      <div class="rpt-dropdown" id="drop-exp" style="display:none">
        <button class="rpt-item active" onclick="pickReport('exp01',this)"><span class="rpt-code">EXP-01</span>Occupation</button>
        <button class="rpt-item" onclick="pickReport('exp02',this)"><span class="rpt-code">EXP-02</span>Recherche client</button>
        <button class="rpt-item" onclick="pickReport('exp03',this)"><span class="rpt-code">EXP-03</span>Petit-déjeuner</button>
        <button class="rpt-item" onclick="pickReport('exp04',this)"><span class="rpt-code">EXP-04</span>PDJ pré-facturés</button>
        <button class="rpt-item" onclick="pickReport('exp05',this)"><span class="rpt-code">EXP-05</span>Planning jour</button>
        <button class="rpt-item" onclick="pickReport('exp06',this)"><span class="rpt-code">EXP-06</span>Gouvernante</button>
        <button class="rpt-item" onclick="pickReport('exp07',this)"><span class="rpt-code">EXP-07</span>Attribution ch.</button>
        <button class="rpt-item" onclick="pickReport('exp08',this)"><span class="rpt-code">EXP-08</span>Groupes</button>
        <button class="rpt-item" onclick="pickReport('exp09',this)"><span class="rpt-code">EXP-09</span>No-shows</button>
        <button class="rpt-item" onclick="pickReport('exp10',this)"><span class="rpt-code">EXP-10</span>Départs restants</button>
        <button class="rpt-item" onclick="pickReport('exp11',this)"><span class="rpt-code">EXP-11</span>Prévision repas</button>
        <button class="rpt-item" onclick="pickReport('exp13',this)"><span class="rpt-code">EXP-13</span>F&amp;B</button>
        <button class="rpt-item" onclick="pickReport('exp14',this)"><span class="rpt-code">EXP-14</span>Occupation prévisionnelle</button>
        <button class="rpt-item" onclick="pickReport('exp15',this)"><span class="rpt-code">EXP-15</span>Productivité ménage</button>
      </div>
    </div>

    <div class="rpt-family-wrap">
      <button class="rpt-family-btn" onclick="toggleFamily('sta',this)">
        <svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none"><path d="M2 12l3-4 3 2 3-5 3 3"/></svg>
        Statistiques
        <svg viewBox="0 0 10 6" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:1.5;margin-left:2px;transition:transform .15s" id="arr-sta"><path d="M1 1l4 4 4-4"/></svg>
      </button>
      <div class="rpt-dropdown" id="drop-sta" style="display:none">
        <button class="rpt-item" onclick="pickReport('sta01',this)"><span class="rpt-code">STA-01</span>Dashboard cumulé</button>
        <button class="rpt-item" onclick="pickReport('sta02',this)"><span class="rpt-code">STA-02</span>Analyse tarifs</button>
        <button class="rpt-item" onclick="pickReport('sta03',this)"><span class="rpt-code">STA-03</span>Allotements</button>
        <button class="rpt-item" onclick="pickReport('sta04',this)"><span class="rpt-code">STA-04</span>Analyse clients</button>
        <button class="rpt-item" onclick="pickReport('sta05',this)"><span class="rpt-code">STA-05</span>Canaux distribution</button>
        <button class="rpt-item" onclick="pickReport('sta06',this)"><span class="rpt-code">STA-06</span>Nationalités</button>
        <button class="rpt-item" onclick="pickReport('sta07',this)"><span class="rpt-code">STA-07</span>INSEE</button>
        <button class="rpt-item" onclick="pickReport('sta08',this)"><span class="rpt-code">STA-08</span>Rotation ch.</button>
        <button class="rpt-item" onclick="pickReport('sta09',this)"><span class="rpt-code">STA-09</span>Turnover chambres</button>
      </div>
    </div>

function getPeriodRange(p){
  const d=new Date(); const iso=s=>s.toISOString().slice(0,10);
  if(p==='today')     return {from:iso(d), to:iso(d)};
  if(p==='yesterday'){const y=new Date(d); y.setDate(y.getDate()-1); return {from:iso(y),to:iso(y)};}
  if(p==='week'){const s=new Date(d); s.setDate(s.getDate()-s.getDay()+1); const e=new Date(s); e.setDate(e.getDate()+6); return {from:iso(s),to:iso(e)};}
  if(p==='month'){const s=new Date(d.getFullYear(),d.getMonth(),1); const e=new Date(d.getFullYear(),d.getMonth()+1,0); return {from:iso(s),to:iso(e)};}
  if(p==='year') return {from:`${d.getFullYear()}-01-01`,to:`${d.getFullYear()}-12-31`};
  if(p==='custom') return {from:rptDateFrom,to:rptDateTo};
  return {from:iso(d),to:iso(d)};
}

function getPeriodLabel(){

  if(p==='today')     return "Aujourd'hui";
  if(p==='yesterday') return "Hier";
  if(p==='week')      return "Cette semaine";
  if(p==='month')     return "Ce mois";
  if(p==='year')      return "Cette année";

}

// Tableau paginé (pour les longs tableaux)
const PAGINATION_STATE = {};
function paginateTable(tableId, rows, perPage=20){
  PAGINATION_STATE[tableId]={rows, perPage, page:1};
  renderPage(tableId);
}
function renderPage(tableId){
  const s=PAGINATION_STATE[tableId]; if(!s) return;
  const {rows,perPage,page}=s;
  const total=rows.length;
  const totalPages=Math.max(1,Math.ceil(total/perPage));
  const start=(page-1)*perPage, end=Math.min(start+perPage,total);
  const tbody=document.getElementById('tbody-'+tableId);
  if(tbody) tbody.innerHTML=rows.slice(start,end).join('');
  const pc=document.getElementById('pag-'+tableId);
  if(!pc||totalPages<=1){if(pc)pc.style.display='none';return;}
  pc.style.display='flex';
  // build page numbers
  let pnums='';
  const range=(a,b)=>Array.from({length:b-a+1},(_,i)=>a+i);
  let pages=[];
  if(totalPages<=7) pages=range(1,totalPages);
  else if(page<=4) pages=[...range(1,5),null,totalPages];
  else if(page>=totalPages-3) pages=[1,null,...range(totalPages-4,totalPages)];
  else pages=[1,null,...range(page-1,page+1),null,totalPages];
  pages.forEach(p=>{
    if(p===null){pnums+=`<span style="padding:0 4px;color:var(--gray400)">…</span>`; return;}
    pnums+=`<button class="pag-btn${p===page?' active':''}" onclick="goPage('${tableId}',${p})">${p}</button>`;
  });
  pc.innerHTML=`
    <span class="pag-info">${total} résultat${total>1?'s':''} · Page ${page}/${totalPages}</span>
    <button class="pag-btn" onclick="goPage('${tableId}',1)" ${page===1?'disabled':''} title="Première page">«</button>
    <button class="pag-btn" onclick="goPage('${tableId}',${page-1})" ${page===1?'disabled':''} title="Précédent">‹</button>
    ${pnums}
    <button class="pag-btn" onclick="goPage('${tableId}',${page+1})" ${page===totalPages?'disabled':''} title="Suivant">›</button>
    <button class="pag-btn" onclick="goPage('${tableId}',${totalPages})" ${page===totalPages?'disabled':''} title="Dernière page">»</button>
    <span class="per-page">Afficher <select onchange="changePerPage('${tableId}',this.value)">
      <option value="20" ${perPage===20?'selected':''}>20</option>
      <option value="50" ${perPage===50?'selected':''}>50</option>
      <option value="100" ${perPage===100?'selected':''}>100</option>
    </select> / page</span>`;
}
function goPage(tableId,p){
  PAGINATION_STATE[tableId].page=p;
  renderPage(tableId);
  const el=document.getElementById('tbody-'+tableId);
  if(el) el.closest('.panel')?.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function changePerPage(tableId,v){
  PAGINATION_STATE[tableId].perPage=parseInt(v);
  PAGINATION_STATE[tableId].page=1;
  renderPage(tableId);
}

// Keyboard pagination
document.addEventListener('keydown',e=>{
  const tableId=Object.keys(PAGINATION_STATE)[0];
  if(!tableId) return;
  if(e.key==='ArrowRight') goPage(tableId, Math.min(PAGINATION_STATE[tableId].page+1, Math.ceil(PAGINATION_STATE[tableId].rows.length/PAGINATION_STATE[tableId].perPage)));
  if(e.key==='ArrowLeft')  goPage(tableId, Math.max(PAGINATION_STATE[tableId].page-1, 1));
});

function toggleCompare(btn){
  compareEnabled=!compareEnabled;
  btn.style.background=compareEnabled?'var(--violet)':'';
  btn.style.color=compareEnabled?'#fff':'';
  const lbl=document.getElementById('cmpLabel');
  if(lbl) lbl.style.display=compareEnabled?'inline-flex':'none';
  showRapport(currentRapport);
}

function toggleFamily(fam, btn){
  const drop=document.getElementById('drop-'+fam);
  const isOpen=drop.style.display!=='none';
  FAMILIES.forEach(f=>{
    const d=document.getElementById('drop-'+f);
    const b=document.querySelector(`.rpt-family-btn[onclick*="'${f}'"]`);
    if(d) d.style.display='none';
    if(b) b.classList.remove('active');
    const arr=document.getElementById('arr-'+f);
    if(arr) arr.style.transform='';
  });
  if(!isOpen){
    drop.style.display='block';
    btn.classList.add('active');
    const arr=document.getElementById('arr-'+fam);
    if(arr) arr.style.transform='rotate(180deg)';
  }
}

document.addEventListener('click',e=>{
  if(!e.target.closest('#rpt-nav')){
    FAMILIES.forEach(f=>{
      const d=document.getElementById('drop-'+f);
      if(d) d.style.display='none';
      const b=document.querySelector(`.rpt-family-btn[onclick*="'${f}'"]`);
      if(b) b.classList.remove('active');
      const arr=document.getElementById('arr-'+f);
      if(arr) arr.style.transform='';
    });
  }
});

function pickReport(type, btn){
  document.querySelectorAll('.rpt-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const fam=getReportFamily(type);
  FAMILIES.forEach(f=>{
    const b=document.querySelector(`.rpt-family-btn[onclick*="'${f}'"]`);
    if(b) b.classList.toggle('active',f===fam);
  });
  showRapport(type);
}

    const c=clientById(r.clientId);
    const nuits=r.nights||1;
    let taxeTotal=0;
    for(let i=0;i<nuits;i++){
      const d=new Date(new Date(r.checkin).getTime()+i*86400000).toISOString().slice(0,10);
      const tarif=isHauteSaison(d,cfg)?bareme.hs:bareme.bs;
      const pax=r.pax||1;
      const taxeNuit=cfg.plafond>0?Math.min(tarif,cfg.plafond):tarif;
      taxeTotal+=taxeNuit*pax;
      const k=isHauteSaison(d,cfg)?'Haute':'Basse';
      if(!tarifMap[k]) tarifMap[k]={saison:k,tarif:isHauteSaison(d,cfg)?bareme.hs:bareme.bs,nuits:0,total:0};
      tarifMap[k].nuits+=pax; tarifMap[k].total+=taxeNuit*pax;
    }
    totalNuits+=nuits*(r.pax||1); totalMontant+=taxeTotal;
    return `<tr><td style="font-weight:600">${c?.name||'—'}</td><td>${r.checkin?new Date(r.checkin).toLocaleDateString('fr-FR'):r.checkin}</td><td>${r.checkout?new Date(r.checkout).toLocaleDateString('fr-FR'):r.checkout}</td><td class="r">${nuits}</td><td class="r">${r.pax||1}</td><td>${pill(isHauteSaison(r.checkin,cfg)?'Haute':'Basse',isHauteSaison(r.checkin,cfg)?'pa':'pp')}</td><td class="r" style="font-weight:700">${fmt2(taxeTotal)}</td><td>${pill('Taxable','pg')}</td></tr>`;
  });

  const tarifRows=Object.values(tarifMap);
  const periodLabel=getPeriodLabel();

  area.innerHTML=(hdr||'')+(sejours.length>0?`<div class="kgrid" style="grid-template-columns:repeat(3,1fr)">
    <div class="kcard"><div class="kbar" style="background:var(--amber)"></div><div class="klbl">Montant total à reverser</div><div class="kval" style="color:var(--amber)">${fmt2(totalMontant)}</div></div>
    <div class="kcard"><div class="kbar" style="background:var(--blue)"></div><div class="klbl">Nuitées taxables</div><div class="kval">${totalNuits}</div></div>
    <div class="kcard"><div class="kbar" style="background:var(--violet)"></div><div class="klbl">Séjours traités</div><div class="kval">${sejours.length}</div></div>
  </div>`:'')+`
  <div class="panel">
    <div class="phd"><div class="ptit">Détail — Taxe de séjour ${etoilesStr} — ${periodLabel}</div><div class="pmeta">Commune : ${cfg.commune} (${cfg.codeINSEE})</div></div>
    <table class="tbl"><thead><tr><th>Client</th><th>Arrivée</th><th>Départ</th><th class="r">Nuits</th><th class="r">PAX</th><th>Saison</th><th class="r">Taxe</th><th>Statut</th></tr></thead>
    <tbody>${sejourRows.join('')||`<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--gray400)">Aucun séjour sur cette période</td></tr>`}
    <tr style="font-weight:700;background:var(--amber-l);border-top:2px solid var(--amber)"><td colspan="4" style="padding:10px 12px;color:var(--amber)">TOTAL À REVERSER À LA MAIRIE</td><td class="r">${totalNuits}</td><td class="r">—</td><td class="r" style="font-size:15px;color:var(--amber)">${fmt2(totalMontant)}</td><td></td></tr>
    </tbody></table>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="panel"><div class="phd"><div class="ptit">Récapitulatif par tarif</div></div><table class="tbl"><thead><tr><th>Saison</th><th class="r">Tarif/nuit</th><th class="r">Nuitées</th><th class="r">Total</th></tr></thead><tbody>${tarifRows.map(t=>`<tr><td>${t.saison==='Haute'?pill('Haute','pa'):pill('Basse','pp')}</td><td class="r">${fmt2(t.tarif)}</td><td class="r">${t.nuits}</td><td class="r" style="font-weight:700">${fmt2(t.total)}</td></tr>`).join('')||`<tr><td colspan="4" style="text-align:center;color:var(--gray400);padding:16px">Aucune donnée</td></tr>`}<tr style="font-weight:700;background:var(--gray50)"><td colspan="2">Total</td><td class="r">${totalNuits}</td><td class="r" style="color:var(--amber)">${fmt2(totalMontant)}</td></tr></tbody></table></div>
    <div class="panel"><div class="phd"><div class="ptit">Informations légales</div></div><div class="pbody" style="font-size:12px;display:flex;flex-direction:column;gap:10px">
      <div style="padding:10px;background:var(--amber-l);border-radius:8px;border:1px solid #fde68a"><div style="font-weight:700;color:var(--amber);margin-bottom:4px">💶 Montant total à reverser</div><div style="font-size:22px;font-weight:800;color:var(--amber)">${fmt2(totalMontant)}</div><div style="font-size:10px;color:var(--gray600);margin-top:4px">Selon barème communal · ${etoilesStr}</div></div>
      <div style="color:var(--gray600);line-height:1.7"><div>📍 <strong>Commune :</strong> ${cfg.commune} (${cfg.codeINSEE})</div><div>🏨 <strong>Classement :</strong> ${etoilesStr}</div><div>📅 <strong>Période :</strong> ${periodLabel}</div><div>🧾 <strong>Exonérations :</strong> ${[cfg.exonerationsMineurs&&'Mineurs',cfg.exonerationsHandicap&&'Handicap',cfg.exonerationsSaisonniers&&'Saisonniers'].filter(Boolean).join(', ')||'Aucune'}</div></div>
      <div style="font-size:10px;color:var(--gray400);border-top:1px solid var(--border);padding-top:8px">Document généré par Flowtym PMS · Usage déclaratif auprès de la commune.</div>
    </div></div>
  </div>`;
}

// EXPORT PDF
// ════════════════════════════════════════════════════════════
const LANDSCAPE_REPORTS=['exp01','exp03','exp04','exp06','fin01','fin02','fin03','fin04','taxe'];

async function exportPDF(){
  toast('Génération PDF en cours...','');
  try{
    const {jsPDF}=window.jspdf;
    const el=document.getElementById('rapportArea');
    const isLandscape=LANDSCAPE_REPORTS.includes(currentRapport)||printOrientation==='landscape';
    const orientation=isLandscape?'l':'p';
    const pageW=isLandscape?297:210, pageH=isLandscape?210:297;
    const margin=12, printW=pageW-margin*2;
    const canvas=await html2canvas(el,{scale:2,useCORS:true,width:el.scrollWidth,height:el.scrollHeight,windowWidth:el.scrollWidth});
    const imgH=canvas.height*printW/canvas.width;
    const pdf=new jsPDF(orientation,'mm',[pageW,pageH]);
    pdf.setFontSize(9); pdf.setTextColor(120);
    pdf.text(`Flowtym PMS · ${currentRapport.toUpperCase()} · ${getPeriodLabel()}`,margin,8);
    pdf.text(`Généré le ${new Date().toLocaleDateString('fr-FR')}`,pageW-margin,8,{align:'right'});
    pdf.setDrawColor(200); pdf.line(margin,10,pageW-margin,10);
    const contentY=14, availH=pageH-contentY-margin;
    if(imgH<=availH){
      pdf.addImage(canvas.toDataURL('image/jpeg',0.92),'JPEG',margin,contentY,printW,imgH);
    } else {
      let yOffset=0; const sliceH=availH*canvas.width/printW;
      while(yOffset<canvas.height){
        if(yOffset>0) pdf.addPage([pageW,pageH],orientation);
        const remaining=canvas.height-yOffset;
        const sliceActual=Math.min(sliceH,remaining);
        const sliceCanvas=document.createElement('canvas');
        sliceCanvas.width=canvas.width; sliceCanvas.height=sliceActual;
        sliceCanvas.getContext('2d').drawImage(canvas,0,yOffset,canvas.width,sliceActual,0,0,canvas.width,sliceActual);
        pdf.addImage(sliceCanvas.toDataURL('image/jpeg',0.92),'JPEG',margin,contentY,printW,sliceActual*printW/canvas.width);
        yOffset+=sliceActual;
      }
    }
    pdf.save(`flowtym-${currentRapport}-${rptDateFrom||TODAY}.pdf`);
    toast(`PDF exporté · ${orientation==='l'?'Paysage':'Portrait'}`,'ok');
  }catch(e){console.error(e);toast('Erreur PDF — '+e.message,'err');}
}

function exportExcel(){
  // Build CSV from table in rapportArea
  const tables=document.querySelectorAll('#rapportArea table.tbl');
  if(!tables.length){ toast('Aucun tableau à exporter',''); return; }
  const rows=[];
  tables[0].querySelectorAll('tr').forEach(tr=>{
    const cells=[...tr.querySelectorAll('th,td')].map(td=>'"'+(td.textContent.trim().replace(/"/g,'""'))+'"');
    if(cells.length) rows.push(cells.join(','));
  });
  const csv='\uFEFF'+rows.join('\n'); // BOM for Excel UTF-8
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`flowtym-${currentRapport}-${rptDateFrom||TODAY}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Export Excel (CSV) téléchargé','ok');
}
